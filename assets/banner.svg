<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050608"/>
      <stop offset="0.52" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#120816"/>
    </linearGradient>
    <linearGradient id="accent" x1="90" y1="70" x2="1040" y2="305" gradientUnits="userSpaceOnUse">
